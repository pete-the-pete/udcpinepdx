<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- 01 Hero Number — temperature is the headline, everything else recedes -->
  <rect width="1024" height="600" fill="#0E0B08"/>

  <!-- subtle ember glow behind the number -->
  <defs>
    <radialGradient id="ember" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#FF6A1A" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FF6A1A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FF6A1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="600" fill="url(#ember)"/>

  <!-- top status row -->
  <g fill="#9A8E83" font-size="14" letter-spacing="2">
    <text x="40" y="44">FIRING #042 · ACTIVE 1:23:11</text>
    <text x="984" y="44" text-anchor="end">19:47 · LIVE</text>
  </g>
  <circle cx="976" cy="40" r="4" fill="#3DDC84"/>

  <!-- the number -->
  <text x="512" y="320" text-anchor="middle" fill="#FFE9D6" font-size="280" font-weight="700" letter-spacing="-8">847</text>
  <text x="512" y="370" text-anchor="middle" fill="#FF8A3D" font-size="22" letter-spacing="6">DEGREES FAHRENHEIT</text>

  <!-- delta indicator -->
  <g transform="translate(512 410)" fill="#3DDC84" font-size="18">
    <path d="M -10 6 l 10 -12 l 10 12 z" fill="#3DDC84"/>
    <text x="20" y="10">+12 in last minute</text>
  </g>

  <!-- pizza card pinned bottom -->
  <g transform="translate(40 470)">
    <rect width="944" height="100" rx="14" fill="#1A1410" stroke="#2A2018" stroke-width="1"/>
    <text x="28" y="38" fill="#9A8E83" font-size="12" letter-spacing="3">NOW BAKING</text>
    <text x="28" y="78" fill="#FFE9D6" font-size="34" font-weight="600">Margherita</text>

    <!-- timer -->
    <g transform="translate(720 50)" text-anchor="end">
      <text x="200" y="-4" fill="#9A8E83" font-size="12" letter-spacing="3">ELAPSED</text>
      <text x="200" y="32" fill="#FFE9D6" font-size="40" font-weight="600" font-variant-numeric="tabular-nums">1:42</text>
    </g>
    <!-- progress bar -->
    <g transform="translate(740 70)">
      <rect width="180" height="6" rx="3" fill="#2A2018"/>
      <rect width="108" height="6" rx="3" fill="#FF6A1A"/>
    </g>
  </g>
</svg>
