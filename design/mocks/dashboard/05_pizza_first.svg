<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- 05 Pizza-first — circular timer ring is the hero, temperature is supporting. -->
  <!-- Reframes priority: the pizza is what you care about right now. -->
  <rect width="1024" height="600" fill="#1A1410"/>

  <!-- subtle radial -->
  <defs>
    <radialGradient id="hearth" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#3A2418" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1A1410" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="600" fill="url(#hearth)"/>

  <!-- top bar -->
  <g fill="#9A8E83" font-size="13" letter-spacing="2">
    <text x="40" y="38">FIRING #042 · 1:23:11</text>
    <text x="984" y="38" text-anchor="end">19:47 · LIVE</text>
  </g>
  <circle cx="976" cy="34" r="4" fill="#3DDC84"/>

  <!-- big circular pizza progress ring, centered -->
  <g transform="translate(512 320)">
    <!-- track -->
    <circle r="190" fill="none" stroke="#2A1F18" stroke-width="22"/>

    <!-- progress arc: 60% of full circle (216°), starting from top (-90°)
         Start: (0, -190). End at angle (-90 + 216) = 126°: (190*cos(126°), 190*sin(126°)) = (-111.7, 153.7)
         Sweep is large-arc since 216 > 180 -->
    <path d="M 0 -190 A 190 190 0 1 1 -111.7 153.7"
          fill="none" stroke="#FF6A1A" stroke-width="22" stroke-linecap="round"/>

    <!-- inner stage: pizza name + timer -->
    <text x="0" y="-30" text-anchor="middle" fill="#FF8A3D" font-size="13" letter-spacing="4">NOW BAKING</text>
    <text x="0" y="14" text-anchor="middle" fill="#FFE9D6" font-size="42" font-weight="600">Margherita</text>
    <text x="0" y="80" text-anchor="middle" fill="#FFE9D6" font-size="68" font-weight="700" font-variant-numeric="tabular-nums" letter-spacing="-2">1:42</text>
    <text x="0" y="108" text-anchor="middle" fill="#9A8E83" font-size="14">of 2:30 target</text>
  </g>

  <!-- LEFT support: temp -->
  <g transform="translate(80 250)">
    <rect x="-20" y="-50" width="180" height="160" rx="12" fill="#231914" stroke="#2A2018" stroke-width="1"/>
    <text x="0" y="-22" fill="#9A8E83" font-size="11" letter-spacing="3">HEARTH</text>
    <text x="0" y="40" fill="#FFE9D6" font-size="58" font-weight="700" letter-spacing="-2">847°</text>
    <text x="0" y="78" fill="#3DDC84" font-size="14">▲ +12/min</text>
  </g>

  <!-- RIGHT support: pizzas this firing -->
  <g transform="translate(844 250)">
    <rect x="-20" y="-50" width="180" height="160" rx="12" fill="#231914" stroke="#2A2018" stroke-width="1"/>
    <text x="0" y="-22" fill="#9A8E83" font-size="11" letter-spacing="3">PIZZAS</text>
    <text x="0" y="40" fill="#FFE9D6" font-size="58" font-weight="700" letter-spacing="-2">3</text>
    <text x="0" y="78" fill="#9A8E83" font-size="14">2:18 avg</text>
  </g>

  <!-- bottom CTA -->
  <text x="512" y="568" text-anchor="middle" fill="#9A8E83" font-size="12" letter-spacing="4">TAP ANYWHERE TO LOG NEW PIZZA</text>
</svg>
