<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>08 CRT Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --crt: #061008;
    --phos: #5BFFA5;
    --phos-dim: #2E8B5B;
    --amber: #FFB81F;
    --magenta: #FF4F8B;
    --shadow: rgba(91,255,165,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1024px; height: 600px; overflow: hidden;
    background: #000;
    font-family: "VT323", monospace;
    color: var(--phos);
  }

  .crt {
    position: relative;
    width: 1024px; height: 600px;
    background:
      radial-gradient(ellipse at center, #0A1A10 0%, #020604 80%);
    overflow: hidden;
  }
  /* scanlines */
  .crt::before {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0) 4px
    );
    pointer-events: none;
    z-index: 5;
  }
  /* vignette / curvature feel */
  .crt::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
    pointer-events: none; z-index: 6;
  }

  .frame {
    position: absolute; inset: 24px;
    border: 2px solid var(--phos);
    box-shadow: 0 0 0 1px #000 inset, 0 0 24px var(--shadow);
    padding: 16px 24px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    z-index: 2;
  }

  /* HUD */
  .hud {
    display: flex; justify-content: space-between; align-items: center;
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--phos);
    text-shadow: 0 0 6px var(--shadow);
    padding-bottom: 14px;
    border-bottom: 2px solid var(--phos-dim);
  }
  .hud .right { display: flex; gap: 24px; }
  .hud .right .item .label { color: var(--phos-dim); }

  /* MAIN */
  main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 32px;
    align-items: center;
    padding: 24px 12px;
  }

  .sevseg {
    font-family: "VT323", monospace;
    font-size: 240px;
    line-height: 0.85;
    color: var(--amber);
    text-shadow:
      0 0 8px rgba(255,184,31,0.55),
      0 0 22px rgba(255,184,31,0.35);
    letter-spacing: 6px;
    font-variant-numeric: tabular-nums;
    position: relative;
  }
  .sevseg .deg {
    font-size: 60px; vertical-align: top; margin-left: 8px;
    color: var(--phos);
    text-shadow: 0 0 8px var(--shadow);
  }
  .label {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    color: var(--phos-dim);
    letter-spacing: 2px;
  }
  .left {
    padding-right: 24px;
  }
  .left .pill {
    margin-bottom: 12px;
  }
  .left .delta {
    margin-top: 12px;
    font-size: 22px;
    color: var(--phos);
    text-shadow: 0 0 6px var(--shadow);
  }
  .left .delta b { color: var(--magenta); }

  .right-panel {
    border: 2px solid var(--phos-dim);
    padding: 16px;
    background: rgba(91,255,165,0.05);
    color: var(--phos);
    text-shadow: 0 0 6px var(--shadow);
  }
  .right-panel .stage {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--phos-dim);
    letter-spacing: 2px;
  }
  .right-panel .pizza {
    font-family: "Press Start 2P", monospace;
    font-size: 18px;
    letter-spacing: 1px;
    margin-top: 12px;
    color: var(--magenta);
    text-shadow: 0 0 8px rgba(255,79,139,0.45);
    line-height: 1.4;
  }
  .right-panel .timer {
    font-size: 88px; line-height: 1;
    margin-top: 10px;
    font-variant-numeric: tabular-nums;
    color: var(--amber);
    text-shadow: 0 0 10px rgba(255,184,31,0.5);
  }
  .right-panel .health {
    margin-top: 12px;
    height: 12px;
    border: 1px solid var(--phos);
    display: flex;
  }
  .right-panel .health span {
    flex: 1; margin: 1px;
    background: var(--phos);
    box-shadow: 0 0 4px var(--shadow);
  }
  .right-panel .health span:nth-child(n+7) { background: var(--phos-dim); box-shadow: none; }
  .right-panel .legend {
    margin-top: 8px;
    font-family: "Press Start 2P", monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--phos-dim);
    display: flex; justify-content: space-between;
  }

  /* footer */
  footer {
    border-top: 2px solid var(--phos-dim);
    padding-top: 12px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: "Press Start 2P", monospace;
    font-size: 10px; letter-spacing: 1px;
    color: var(--phos-dim);
  }
  footer .blink { color: var(--phos); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* CRT flicker */
  .flicker { animation: flick 5s infinite steps(60); }
  @keyframes flick {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: 0.92; }
    95% { opacity: 1; }
    97% { opacity: 0.85; }
    98% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="crt flicker">
    <div class="frame">
      <div class="hud">
        <div>★ HEARTH·KEEPER  v0.1</div>
        <div class="right">
          <div class="item"><span class="label">FIRING </span>042</div>
          <div class="item"><span class="label">HI </span>1023°</div>
          <div class="item"><span class="label">TIME </span>01:23:11</div>
        </div>
      </div>

      <main>
        <div class="left">
          <div class="label pill">▼ HEARTH TEMPERATURE</div>
          <div class="sevseg">847<span class="deg">°F</span></div>
          <div class="delta">DELTA <b>+12°/MIN</b> · PEAK 862°</div>
        </div>

        <div class="right-panel">
          <div class="stage">STAGE 03 — IN THE FIRE</div>
          <div class="pizza">MARGHERITA</div>
          <div class="label" style="margin-top:14px;">CLOCK</div>
          <div class="timer">1:42</div>
          <div class="health">
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
          <div class="legend"><span>0:00</span><span>2:30</span></div>
        </div>
      </main>

      <footer>
        <div>★ PLAYER 1: P. KEEN</div>
        <div><span class="blink">▮</span> PRESS START TO LOG NEXT PIE</div>
        <div>3 PIZZAS · BEST 2:11</div>
      </footer>
    </div>
  </div>
</body>
</html>
