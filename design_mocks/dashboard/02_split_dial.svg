<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- 02 Split Dial — analog gauge left, pizza panel right. Dashboard-classic. -->
  <rect width="1024" height="600" fill="#F4F1EC"/>

  <!-- header -->
  <g fill="#5C5246" font-size="13" letter-spacing="2">
    <text x="40" y="40">FIRING #042</text>
    <text x="984" y="40" text-anchor="end">ACTIVE · 1:23:11</text>
  </g>
  <line x1="40" y1="60" x2="984" y2="60" stroke="#D9D2C7" stroke-width="1"/>

  <!-- LEFT: gauge dial -->
  <g transform="translate(256 340)">
    <!-- arc track -->
    <path d="M -160 0 A 160 160 0 1 1 160 0" fill="none" stroke="#E4DDD0" stroke-width="20" stroke-linecap="round"/>
    <!-- filled arc: 847/1000 of sweep ~ 0.847; sweep goes from 180° to 360° (top half), so we need fraction of upper semicircle.
         Using a stop angle = 180 + 180*0.847 = 332.46°. Endpoint: cx + 160*cos(332.46°), cy + 160*sin(332.46°). -->
    <path d="M -160 0 A 160 160 0 1 1 141.74 -73.84" fill="none" stroke="#D9501C" stroke-width="20" stroke-linecap="round"/>

    <!-- tick marks -->
    <g stroke="#9A8E7A" stroke-width="2" stroke-linecap="round">
      <line x1="-160" y1="0" x2="-145" y2="0"/>
      <line x1="-113" y1="-113" x2="-103" y2="-103"/>
      <line x1="0" y1="-160" x2="0" y2="-145"/>
      <line x1="113" y1="-113" x2="103" y2="-103"/>
      <line x1="160" y1="0" x2="145" y2="0"/>
    </g>
    <g fill="#9A8E7A" font-size="12" text-anchor="middle">
      <text x="-178" y="4">200</text>
      <text x="-128" y="-128">450</text>
      <text x="0" y="-176">700</text>
      <text x="128" y="-128">900</text>
      <text x="178" y="4">1000</text>
    </g>

    <!-- center readout -->
    <text x="0" y="-10" text-anchor="middle" fill="#1F1A14" font-size="92" font-weight="700" letter-spacing="-2">847</text>
    <text x="0" y="20" text-anchor="middle" fill="#5C5246" font-size="16" letter-spacing="3">°F · +12/min</text>
  </g>

  <!-- RIGHT: pizza panel -->
  <g transform="translate(560 100)">
    <rect width="424" height="450" rx="16" fill="#FFFFFF" stroke="#D9D2C7" stroke-width="1"/>

    <text x="32" y="44" fill="#5C5246" font-size="12" letter-spacing="3">NOW BAKING</text>
    <text x="32" y="92" fill="#1F1A14" font-size="42" font-weight="600">Margherita</text>

    <!-- timer block -->
    <g transform="translate(32 140)">
      <text x="0" y="0" fill="#5C5246" font-size="12" letter-spacing="3">ELAPSED</text>
      <text x="0" y="60" fill="#1F1A14" font-size="64" font-weight="600" font-variant-numeric="tabular-nums">1:42</text>
      <text x="0" y="86" fill="#9A8E7A" font-size="14">target 2:30</text>
    </g>

    <!-- progress -->
    <g transform="translate(32 270)">
      <rect width="360" height="8" rx="4" fill="#EFE8DB"/>
      <rect width="216" height="8" rx="4" fill="#D9501C"/>
      <text x="0" y="36" fill="#5C5246" font-size="13">60% · 48 sec remaining</text>
    </g>

    <!-- previous pizzas mini-list -->
    <g transform="translate(32 360)">
      <text x="0" y="0" fill="#5C5246" font-size="12" letter-spacing="3">EARLIER</text>
      <g fill="#1F1A14" font-size="14">
        <text x="0" y="26">Funghi · 2:18</text>
        <text x="0" y="52">Diavola · 2:34</text>
      </g>
    </g>
  </g>
</svg>
