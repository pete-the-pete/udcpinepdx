name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shared:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install workspace deps
        run: make build

      - name: Regenerate codegen outputs
        run: make codegen

      - name: Verify codegen is up to date
        run: |
          if ! git diff --exit-code -- shared/generated; then
            echo "::error::Codegen outputs are out of date. Run 'make codegen' locally and commit."
            exit 1
          fi

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install workspace deps
        run: make build

      - name: Install Playwright Chromium
        run: cd web/frontend && bunx playwright install --with-deps chromium

      - name: Run E2E
        run: make e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/frontend/playwright-report/
          retention-days: 7
