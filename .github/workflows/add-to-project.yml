name: Add to project

on:
  issues:
    types: [opened, reopened, closed]
  pull_request_target:
    types: [opened, reopened, ready_for_review, closed]

permissions: {}

jobs:
  add-to-project:
    name: Add and set status
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Add issue or PR to project 4
        id: add
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd  # v2.0.0
        with:
          project-url: https://github.com/users/pete-the-pete/projects/4
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

      - name: Set Status field
        env:
          GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
          ITEM_ID: ${{ steps.add.outputs.itemId }}
          IS_PR: ${{ github.event_name == 'pull_request_target' }}
          IS_CLOSE: ${{ github.event.action == 'closed' }}
          HAS_AGENT_READY: ${{ github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'agent-ready') }}
        run: |
          set -euo pipefail
          PROJECT_ID="$(gh api graphql -f query='
            query($login: String!, $number: Int!) {
              user(login: $login) { projectV2(number: $number) { id } }
            }' -F login=pete-the-pete -F number=4 \
            --jq '.data.user.projectV2.id')"

          STATUS_FIELD_ID="PVTSSF_lAHOAAVHgc4BUmcOzhBtgJA"
          # Closed issues and closed PRs (merged or discarded) → Done. The
          # board has no separate "Cancelled" lane; discarded PRs land in Done
          # too, which is fine — they're out of the queue either way.
          if [ "$IS_CLOSE" = "true" ]; then
            OPTION_ID="fc4374c8"   # Done
          elif [ "$IS_PR" = "true" ]; then
            OPTION_ID="bcfefaf6"   # In Progress
          elif [ "$HAS_AGENT_READY" = "true" ]; then
            OPTION_ID="9f289c57"   # Ready
          else
            OPTION_ID="24f8c76e"   # Todo
          fi

          gh api graphql -f query='
            mutation($project: ID!, $item: ID!, $field: ID!, $option: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId: $item
                fieldId: $field
                value: { singleSelectOptionId: $option }
              }) { projectV2Item { id } }
            }' \
            -F project="$PROJECT_ID" \
            -F item="$ITEM_ID" \
            -F field="$STATUS_FIELD_ID" \
            -F option="$OPTION_ID"
